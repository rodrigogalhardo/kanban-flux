services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kanban_flux
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kanban_flux
      NEXTAUTH_SECRET: kanban-flux-docker-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
